<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - Under Maintenance</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .maintenance-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bs-light);
            position: relative;
            overflow: hidden;
        }

        .maintenance-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        .wrench-icon {
            font-size: 6rem;
            color: var(--bs-primary);
            margin-bottom: 20px;
            animation: rotate 3s linear infinite;
            display: inline-block;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="maintenance-wrapper">
        <div class="maintenance-content">
            <i class="ph-fill ph-wrench wrench-icon"></i>
            <h1 class="display-5 fw-bold text-dark mb-4">We're Currently Under Maintenance</h1>
            <p class="fs-5 text-muted mb-5 lh-lg">Stackly is undergoing scheduled maintenance to improve our systems and
                update our seasonal menu. We apologize for the inconvenience and will be back shortly.</p>

            <a href="#"
                class="btn btn-outline-dark btn-lg rounded-pill fw-bold px-5 py-3 shadow-sm d-inline-flex gap-2 align-items-center">
                <i class="ph-bold ph-envelope"></i> Contact Support
            </a>

            <p class="text-muted mt-5 small">Expected downtime: ~2 hours</p>
        </div>
    </div>

</body>

</html>
