<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - Coming Soon</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .coming-soon-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(rgba(29, 53, 87, 0.8), rgba(29, 53, 87, 0.95)), url('assets/images/hero-bg.webp') center/cover;
            color: white;
            text-align: center;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            min-width: 100px;
            display: inline-block;
            margin: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .countdown-number {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            color: var(--bs-primary);
            margin-bottom: 5px;
        }

        .countdown-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="coming-soon-wrapper">
        <div class="container py-5">
            <img src="assets/images/logo.webp" alt="Stackly Logo" height="60" class="mb-5">

            <h1 class="display-3 fw-bold mb-4">A New Culinary Experience<br>Is Cooking</h1>
            <p class="fs-5 opacity-75 mb-5 mx-auto" style="max-width: 600px;">Our master chefs are currently perfecting
                a brand new dining experience. Subscribe to be notified the moment we open our doors.</p>

            <!-- Dynamic Countdown -->
            <div class="d-flex flex-wrap justify-content-center mb-5" id="countdown">
                <div class="countdown-item">
                    <div class="countdown-number" id="days">14</div>
                    <div class="countdown-label">Days</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id="hours">08</div>
                    <div class="countdown-label">Hours</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id="minutes">45</div>
                    <div class="countdown-label">Minutes</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-number" id="seconds">12</div>
                    <div class="countdown-label">Seconds</div>
                </div>
            </div>

            <!-- Notify Form -->
            <form class="d-flex justify-content-center mx-auto" style="max-width: 500px;"
                onsubmit="event.preventDefault(); alert('Subscribed!');">
                <input type="email" class="form-control form-control-lg rounded-start-pill border-0 shadow-none px-4"
                    placeholder="Enter your email address..." required>
                <button type="submit" class="btn btn-primary btn-lg rounded-end-pill fw-bold px-4">Notify Me</button>
            </form>

            <div class="mt-5 pt-5 d-flex justify-content-center gap-4">
                <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'}); return false;"
                    class="text-white opacity-75 fs-4 hover-opacity-100"><i class="ph-fill ph-facebook-logo"></i></a>
                <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'}); return false;"
                    class="text-white opacity-75 fs-4 hover-opacity-100"><i class="ph-fill ph-instagram-logo"></i></a>
                <a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'}); return false;"
                    class="text-white opacity-75 fs-4 hover-opacity-100"><i class="ph-fill ph-twitter-logo"></i></a>
            </div>

        </div>
    </div>

</body>

</html>
