<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stackly - Forgot Password</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            background-color: var(--bs-body-bg);
        }

        .auth-form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-form-container {
            width: 100%;
            max-width: 480px;
        }

        .auth-img-side {
            flex: 1;
            display: none;
            position: relative;
            background: linear-gradient(rgba(10, 11, 10, .6), rgba(10, 11, 10, .85)), url('assets/images/hero-bg.webp') center/cover no-repeat;
            border-left: 1px solid rgba(197, 160, 89, .2);
        }

        @media (min-width: 992px) {
            .auth-img-side {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .form-control.auth-input {
            background: rgba(255, 255, 255, .03) !important;
            border: 1px solid rgba(255, 255, 255, .08) !important;
            color: #fff !important;
            border-radius: 0 !important;
            padding: 14px 16px;
            transition: border-color .2s ease, background .2s ease;
        }

        .form-control.auth-input:focus {
            box-shadow: none !important;
            border-color: rgba(197, 160, 89, .4) !important;
            background: rgba(255, 255, 255, .06) !important;
        }

        .input-group-text.auth-icon {
            background: rgba(255, 255, 255, .03) !important;
            border: 1px solid rgba(255, 255, 255, .08) !important;
            border-right: none !important;
            border-radius: 0 !important;
            color: rgba(197, 160, 89, .7) !important;
            transition: border-color .2s ease, background .2s ease;
        }

        .form-control.auth-input {
            border-left: none !important;
        }

        /* Focus within trick */
        .input-group:focus-within .auth-icon {
            border-color: rgba(197, 160, 89, .4) !important;
            background: rgba(255, 255, 255, .06) !important;
            color: rgba(197, 160, 89, 1) !important;
        }

        .btn-auth {
            border-radius: 0;
            text-transform: uppercase;
            letter-spacing: .1em;
            font-weight: 700;
        }

        .btn-outline-social {
            border: 1px solid rgba(255, 255, 255, .15);
            color: #fff;
            background: transparent;
            transition: background .2s ease, border-color .2s ease;
        }

        .btn-outline-social:hover {
            background: rgba(255, 255, 255, .05);
            border-color: rgba(255, 255, 255, .3);
            color: #fff;
        }

        .auth-chip {
            border: 1px solid rgba(197, 160, 89, .35);
            background: rgba(0, 0, 0, .35);
            backdrop-filter: blur(8px);
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: rgba(255, 255, 255, .5);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            transition: color .2s ease;
            font-size: .85rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            z-index: 10;
        }

        .back-btn:hover {
            color: var(--bs-primary);
        }
    </style>
</head>

<body class="tastyc-theme">

    <div class="auth-wrapper">
        <!-- Form Side -->
        <div class="auth-form-side position-relative">
            <a href="index.html" class="back-btn">
                <i class="ph-bold ph-arrow-left"></i> Back to Home
            </a>

            <div class="auth-form-container">
                <div class="text-center mb-5">
                    <a href="index.html" class="d-inline-block text-decoration-none mb-3">
                        <h2 class="text-white fw-bold mb-0"
                            style="font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; letter-spacing: 2px;">
                            <img src="assets/images/logo.webp" alt="Logo"
                                style="height: 1.5em; vertical-align: middle; transform: translateY(-2px);">
                        </h2>
                    </a>
                    <h4 class="fw-bold text-white text-uppercase tracking-wide">Reset Password</h4>
                    <p class="text-light opacity-50 font-base mt-2">Enter your email address to receive a password reset
                        link.</p>
                </div>

                <form action="index.html" method="GET">
                    <!-- Email -->
                    <div class="mb-4">
                        <label
                            class="form-label text-light opacity-75 font-base text-uppercase tracking-wide fs-7 mb-2">Email
                            Address</label>
                        <div class="input-group">
                            <span class="input-group-text auth-icon"><i class="ph-bold ph-envelope"></i></span>
                            <input type="email" class="form-control auth-input shadow-none"
                                placeholder="Enter your email" required autofocus>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <button type="submit"
                        class="btn btn-primary text-dark w-100 py-3 btn-auth hover-white mb-3 shadow-none">
                        Send Reset Link
                    </button>



                    <p class="text-center mb-0 text-light opacity-50 font-base">
                        Remember your password?
                        <a href="signin.html"
                            class="text-primary fw-bold text-decoration-none hover-white transition-all ms-1 border-bottom border-primary pb-1">Sign
                            In</a>
                    </p>
                </form>
            </div>
        </div>

        <!-- Image Side -->
        <div class="auth-img-side">
            <div class="text-center px-4 px-xl-5 position-relative z-3">
                <div class="d-inline-flex align-items-center gap-2 px-3 py-2 rounded-pill auth-chip mb-4">
                    <i class="ph-fill ph-star text-primary"></i>
                    <span class="text-uppercase tracking-wide fs-7 text-light opacity-75">Premium Dining</span>
                </div>
                <h2 class="display-4 fw-bold font-heading text-white mb-4"
                    style="text-shadow: 0 4px 20px rgba(0,0,0,.5);">
                    Reserve Your<br />Unforgettable Evening
                </h2>
                <p class="fs-5 text-light opacity-75 font-base mx-auto" style="max-width: 480px;">
                    Access exclusive seasonal menus, book priority reservations, and experience the finest culinary
                    artistry.
                </p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
