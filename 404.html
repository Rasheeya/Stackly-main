<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - 404 Error</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('assets/images/hero-bg.webp') center/cover;
            position: relative;
        }

        .error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(29, 53, 87, 0.8), rgba(29, 53, 87, 0.95));
            z-index: 1;
        }

        .error-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            max-width: 600px;
            padding: 2rem;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            color: var(--bs-primary);
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>

    <div class="error-page">
        <div class="error-overlay"></div>
        <div class="error-content" data-aos="zoom-in">
            <h1 class="error-code mb-4">404</h1>
            <h2 class="display-5 fw-bold mb-3">Looks Like This Dish Is Off the Menu!</h2>
            <p class="fs-5 opacity-75 mb-5 lh-lg">We couldn't find the page you were looking for. It might have been
                devoured by one of our master chefs.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="index.html"
                    class="btn btn-primary btn-lg rounded-pill fw-bold px-5 py-3 shadow-lg d-inline-flex gap-2 align-items-center">
                    <i class="ph-bold ph-house-line"></i> Back to Homepage
                </a>
                <button onclick="history.back()"
                    class="btn btn-outline-primary btn-lg rounded-pill fw-bold px-5 py-3 shadow-lg d-inline-flex gap-2 align-items-center">
                    <i class="ph-bold ph-arrow-left"></i> Go Back
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>

</html>
